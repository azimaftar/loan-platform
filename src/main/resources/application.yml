spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/loanplatform
    username: loanuser
    password: loanpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    persistAuthorization: true
    disable-swagger-default-url: true
  default-security-schemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

server:
  port: 8080

app:
  jwt:
    secret: 3f8e2d1a9c7b4f6e0d5a2c8b1e4f7a3d9c6b2e5f8a1d4c7b0e3f6a9d2c5b8e1f
    expiration: 86400000