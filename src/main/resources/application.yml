spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/loanplatform
    username: loanuser
    password: loanpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080