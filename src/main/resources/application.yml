
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/loanplatform}
    username: ${PGUSER:loanuser}
    password: ${PGPASSWORD:loanpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    persistAuthorization: true
    disable-swagger-default-url: true

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:3f8e2d1a9c7b4f6e0d5a2c8b1e4f7a3d9c6b2e5f8a1d4c7b0e3f6a9d2c5b8e1f}
    expiration: ${JWT_EXPIRATION:86400000}
  risk:
    approve-threshold: 0.45
    reject-threshold: 0.65

