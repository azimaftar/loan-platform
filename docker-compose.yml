version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: loan_platform_db
    environment:
      POSTGRES_DB: loanplatform
      POSTGRES_USER: loanuser
      POSTGRES_PASSWORD: loanpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: